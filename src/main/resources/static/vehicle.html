<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vehicles</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
    body{background:#121321;color:#36bebe;}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px;}
    .card{
      width:900px;max-width:95vw;
      background:rgba(255,255,255,0.08);
      backdrop-filter: blur(30px);
      border-radius:24px;
      padding:24px;
      box-shadow:0 10px 40px rgba(0,0,0,0.35);
    }
    h2{margin-bottom:16px;}
    .row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;}
    input, select{
      padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,0.15);
      background:rgba(0,0,0,0.25);color:#36bebe;outline:none;
    }
    button{
      padding:10px 14px;border-radius:12px;border:none;cursor:pointer;
      background:#36bebe;color:#121321;font-weight:bold;
    }
    button.secondary{background:rgba(255,255,255,0.15);color:#36bebe;border:1px solid rgba(255,255,255,0.18);}
    table{width:100%;border-collapse:collapse;margin-top:14px;}
    th,td{padding:10px;border-bottom:1px solid rgba(255,255,255,0.12);text-align:left;}
    .pill{padding:4px 10px;border-radius:999px;background:rgba(255,255,255,0.12);display:inline-block;}
    .msg{margin:10px 0;color:#fff;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="row" style="justify-content:space-between;align-items:center;">
      <h2>🚗 Vehicles</h2>
      <button class="secondary" onclick="goDashboard()">⬅ Dashboard</button>
    </div>

    <div class="msg" id="message"></div>

    <h3>Add Vehicle</h3>
    <div class="row">
      <input id="make" placeholder="Make (Toyota)" />
      <input id="model" placeholder="Model (Camry)" />
      <input id="year" type="number" placeholder="Year (2022)" />
      <input id="mileage" type="number" placeholder="Mileage (21000)" />
      <select id="type">
        <option value="CAR">CAR</option>
        <option value="SUV">SUV</option>
        <option value="TRUCK">TRUCK</option>
      </select>
      <input id="rate" type="number" step="0.01" placeholder="Daily Rate (55)" />
      <button onclick="addVehicle()">Add</button>
    </div>

    <div class="row">
      <button onclick="loadVehicles()">Refresh List</button>
      <button class="secondary" onclick="loadAvailable()">Show Available Only</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th><th>Make</th><th>Model</th><th>Type</th><th>Rate</th><th>Available</th><th>Action</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
  const API = "http://localhost:8080/api";

  function requireLogin(allowedRoles){
    const token = localStorage.getItem("token");
    const role  = localStorage.getItem("role");
    if(!token){ window.location.href="index.html"; return; }
    if(allowedRoles && !allowedRoles.includes(role)){
      alert("Access denied for role: " + role);
      window.location.href="index.html";
    }
  }

  function authHeaders(extra = {}) {
    return { "Authorization": "Bearer " + localStorage.getItem("token"), ...extra };
  }

  function goDashboard(){ window.location.href = "dashboard.html"; }

  function logout(){
    localStorage.removeItem("token");
    localStorage.removeItem("role");
    window.location.href="index.html";
  }

  function setMsg(txt){ document.getElementById("message").innerText = txt || ""; }

  requireLogin(["ADMIN"]);

  async function addVehicle(){
    const body = {
      make: document.getElementById("make").value.trim(),
      model: document.getElementById("model").value.trim(),
      year: Number(document.getElementById("year").value),
      mileage: Number(document.getElementById("mileage").value),
      type: document.getElementById("type").value,
      dailyRate: Number(document.getElementById("rate").value)
    };

    if(!body.make || !body.model || !body.year || !body.type || !body.dailyRate){
      setMsg("⚠ Please fill make, model, year, type, daily rate.");
      return;
    }

    const res = await fetch(API + "/vehicles", {
      method:"POST",
      headers: authHeaders({ "Content-Type":"application/json" }),
      body: JSON.stringify(body)
    });

    if(!res.ok){
      setMsg("❌ Failed to add vehicle (unauthorized or server error).");
      return;
    }

    setMsg("✅ Vehicle added!");
    await loadVehicles();
  }

  async function loadVehicles(){
    setMsg("");
    const res = await fetch(API + "/vehicles", { headers: authHeaders() });
    if(!res.ok){ setMsg("❌ Unauthorized."); return; }
    const data = await res.json();
    render(data);
  }

  async function loadAvailable(){
    setMsg("");
    const res = await fetch(API + "/vehicles/available", { headers: authHeaders() });
    if(!res.ok){ setMsg("❌ Unauthorized."); return; }
    const data = await res.json();
    render(data);
  }

  function render(list){
    const tb = document.getElementById("tbody");
    tb.innerHTML = "";
    list.forEach(v => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${v.id}</td>
        <td>${v.make}</td>
        <td>${v.model}</td>
        <td><span class="pill">${v.type}</span></td>
        <td>$${Number(v.dailyRate).toFixed(2)}</td>
        <td>${v.available ? "✅" : "❌"}</td>
        <td><button class="secondary" onclick="del(${v.id})">Delete</button></td>
      `;
      tb.appendChild(tr);
    });
  }

  async function del(id){
    const res = await fetch(API + "/vehicles/" + id, {
      method:"DELETE",
      headers: authHeaders()
    });

    if(res.ok){
      setMsg("🗑 Vehicle deleted: " + id);
      await loadVehicles();
    } else {
      setMsg("❌ Delete failed (unauthorized?).");
    }
  }

  loadVehicles();
</script>

</body>
</html>
