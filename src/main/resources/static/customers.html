<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Customers</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
    body{background:#121321;color:#36bebe;}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px;}
    .card{width:900px;max-width:95vw;background:rgba(255,255,255,0.08);backdrop-filter:blur(30px);
      border-radius:24px;padding:24px;box-shadow:0 10px 40px rgba(0,0,0,0.35);}
    h2{margin-bottom:16px;}
    .row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
    input,select{padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,0.15);
      background:rgba(0,0,0,0.25);color:#36bebe;outline:none;}
    button{padding:10px 14px;border-radius:12px;border:none;cursor:pointer;background:#36bebe;color:#121321;font-weight:bold;}
    button.secondary{background:rgba(255,255,255,0.15);color:#36bebe;border:1px solid rgba(255,255,255,0.18);}
    table{width:100%;border-collapse:collapse;margin-top:14px;}
    th,td{padding:10px;border-bottom:1px solid rgba(255,255,255,0.12);text-align:left;}
    .pill{padding:4px 10px;border-radius:999px;background:rgba(255,255,255,0.12);display:inline-block;}
    .msg{margin:10px 0;color:#fff;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="row" style="justify-content:space-between;">
      <h2>👤 Customers</h2>
      <button class="secondary" onclick="goDashboard()">⬅ Dashboard</button>
    </div>

    <div class="msg" id="message"></div>

    <h3>Add Customer</h3>
    <div class="row">
      <input id="name" placeholder="Name (Navneet)" />
      <input id="email" placeholder="Email (navneet@gmail.com)" />
      <input id="phone" placeholder="Phone (312...)" />
      <select id="ctype">
        <option value="INDIVIDUAL">INDIVIDUAL</option>
        <option value="CORPORATE">CORPORATE</option>
      </select>
      <input id="discount" type="number" step="0.01" placeholder="Discount (0.10)" />
      <button onclick="addCustomer()">Add</button>
    </div>

    <div class="row">
      <button onclick="loadCustomers()">Refresh List</button>
    </div>

    <table>
      <thead>
        <tr><th>ID</th><th>Name</th><th>Email</th><th>Type</th><th>Discount</th></tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
  const API = "http://localhost:8080/api";

  function requireLogin(allowedRoles){
    const token = localStorage.getItem("token");
    const role  = localStorage.getItem("role");
    if(!token){ window.location.href="index.html"; return; }
    if(allowedRoles && !allowedRoles.includes(role)){
      alert("Access denied for role: " + role);
      window.location.href="index.html";
    }
  }

  function authHeaders(extra = {}) {
    return { "Authorization": "Bearer " + localStorage.getItem("token"), ...extra };
  }

  function goDashboard(){ window.location.href="dashboard.html"; }

  function logout(){
    localStorage.removeItem("token");
    localStorage.removeItem("role");
    window.location.href="index.html";
  }

  function setMsg(t){ document.getElementById("message").innerText = t || ""; }

  requireLogin(["ADMIN"]);

  async function addCustomer(){
    const body = {
      name: document.getElementById("name").value.trim(),
      email: document.getElementById("email").value.trim(),
      phone: document.getElementById("phone").value.trim(),
      customerType: document.getElementById("ctype").value,
      discountRate: Number(document.getElementById("discount").value || 0)
    };

    if(!body.name || !body.email){
      setMsg("⚠ Name and Email are required.");
      return;
    }

    const res = await fetch(API + "/customers", {
      method:"POST",
      headers: authHeaders({ "Content-Type":"application/json" }),
      body: JSON.stringify(body)
    });

    if(!res.ok){
      setMsg("❌ Failed to add customer (unauthorized or email exists).");
      return;
    }

    setMsg("✅ Customer added!");
    await loadCustomers();
  }

  async function loadCustomers(){
    setMsg("");
    const res = await fetch(API + "/customers", { headers: authHeaders() });
    if(!res.ok){ setMsg("❌ Unauthorized."); return; }
    const data = await res.json();

    const tb = document.getElementById("tbody");
    tb.innerHTML = "";
    data.forEach(c => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${c.id}</td>
        <td>${c.name}</td>
        <td>${c.email}</td>
        <td><span class="pill">${c.customerType}</span></td>
        <td>${(Number(c.discountRate)*100).toFixed(0)}%</td>
      `;
      tb.appendChild(tr);
    });
  }

  loadCustomers();
</script>

</body>
</html>
